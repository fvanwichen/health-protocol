<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Blueprint" />
  <meta name="theme-color" content="#0A0A0A" />
  <meta name="description" content="Daily longevity & health protocol assistant" />

  <title>Blueprint Protocol</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- iOS Home Screen Icon (inline SVG as data URI) -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='36' fill='%230A0A0A'/><text x='90' y='112' font-size='82' font-family='system-ui' font-weight='700' fill='%2300E5A0' text-anchor='middle'>B</text></svg>" />

  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:     '#0A0A0A',
            accent: '#00E5A0',   /* Muted neon green — change to #3B82F6 for electric blue */
          },
          fontFamily: {
            sans: ['"SF Pro Display"', '"SF Pro Text"', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'system-ui', 'sans-serif'],
            mono: ['"SF Mono"', '"Fira Code"', '"JetBrains Mono"', 'ui-monospace', 'monospace'],
          }
        }
      }
    }
  </script>

  <style>
    /* ── ROOT VARIABLES ──────────────────────────────── */
    :root {
      --accent: #00E5A0;
      --bg: #0A0A0A;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }

    /* ── BASE RESET ──────────────────────────────────── */
    * {
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    html, body {
      background: var(--bg);
      color: #FAFAFA;
      overflow-x: hidden;
      overscroll-behavior: none;
    }

    /* Remove number input spinners on iOS/Android */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"] {
      -moz-appearance: textfield;
    }

    /* ── SCROLLBAR ────────────────────────────────────── */
    ::-webkit-scrollbar { width: 0; }

    /* ── TRANSITIONS ──────────────────────────────────── */
    #main-content {
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    /* ── SUBTLE NOISE TEXTURE ─────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.015;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
    }

    /* ── GLOW EFFECT FOR ACTIVE NAV ───────────────────── */
    .nav-btn.text-accent {
      filter: drop-shadow(0 0 8px rgba(0, 229, 160, 0.25));
    }

    /* ── PULSE ANIMATION ──────────────────────────────── */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }

    /* ── iOS STANDALONE SAFE AREAS ─────────────────────── */
    @supports (padding: env(safe-area-inset-top)) {
      .safe-top { padding-top: env(safe-area-inset-top); }
      .safe-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 0.5rem); }
    }
  </style>
</head>

<body class="bg-bg text-white min-h-screen flex flex-col">

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STATUS BAR SPACER (iOS standalone mode)                -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <div class="safe-top bg-bg"></div>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- HEADER                                                 -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <header class="flex-shrink-0 px-5 pt-3 pb-2 flex items-center justify-between">
    <div class="flex items-center gap-2.5">
      <!-- Logo mark -->
      <div class="w-8 h-8 rounded-lg bg-accent/10 border border-accent/20 flex items-center justify-center">
        <span class="text-accent font-bold text-sm">B</span>
      </div>
      <div>
        <p class="text-[13px] font-bold tracking-tight leading-none">Blueprint</p>
        <p class="text-[9px] text-white/25 font-mono tracking-[0.15em] uppercase leading-none mt-0.5">Protocol v1.0</p>
      </div>
    </div>
    <!-- Status indicator -->
    <div class="flex items-center gap-1.5">
      <div class="w-1.5 h-1.5 rounded-full bg-accent/60"></div>
      <span class="text-[10px] font-mono text-white/20">ACTIVE</span>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- MAIN CONTENT AREA (scrollable)                         -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <main id="main-content" class="flex-1 overflow-y-auto pb-24">
    <!-- Views are rendered here by app.js -->
  </main>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- TOAST NOTIFICATION                                     -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <div id="toast"
    class="fixed top-16 left-1/2 -translate-x-1/2 z-50 px-5 py-2.5 rounded-full
           bg-white/10 backdrop-blur-xl border border-white/10
           text-xs font-medium text-white/80
           opacity-0 translate-y-4 transition-all duration-300 pointer-events-none">
  </div>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- BOTTOM NAVIGATION                                      -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <nav class="fixed bottom-0 left-0 right-0 bg-bg/80 backdrop-blur-2xl border-t border-white/[0.06] safe-bottom z-40">
    <div class="flex items-center justify-around py-2 max-w-md mx-auto">

      <!-- Daily Stack -->
      <button class="nav-btn text-accent flex flex-col items-center gap-1 px-6 py-1.5 transition-all duration-300" data-view="stack">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <span class="text-[10px] font-semibold tracking-wide">Stack</span>
      </button>

      <!-- The Forge -->
      <button class="nav-btn text-white/30 flex flex-col items-center gap-1 px-6 py-1.5 transition-all duration-300" data-view="forge">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/>
          <line x1="12" y1="22" x2="12" y2="15.5"/>
          <polyline points="22 8.5 12 15.5 2 8.5"/>
          <polyline points="2 15.5 12 8.5 22 15.5"/>
        </svg>
        <span class="text-[10px] font-semibold tracking-wide">Forge</span>
      </button>

      <!-- The Lab -->
      <button class="nav-btn text-white/30 flex flex-col items-center gap-1 px-6 py-1.5 transition-all duration-300" data-view="lab">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        <span class="text-[10px] font-semibold tracking-wide">Lab</span>
      </button>

    </div>
  </nav>

  <!-- Application Logic -->
  <script src="/app.js"></script>
</body>
</html>
